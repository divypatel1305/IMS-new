    <h1>Internal Transfer</h1>
    <div class="form-card">
        <h3>Transfer Product</h3>
        <input type="text" id="tProduct" placeholder="Product Name">
        <input type="number" id="tQty" placeholder="Quantity">
        <input type="text" id="tFromWh" placeholder="From Warehouse">
        <input type="text" id="tToWh" placeholder="To Warehouse">
        <button onclick="addTransfer()">Transfer Product</button>
    </div>

    <h2>Transfer History</h2>
    <table>
        <thead>
            <tr><th>Date</th><th>Product</th><th>Quantity</th><th>From</th><th>To</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
