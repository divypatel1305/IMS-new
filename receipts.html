<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Receipts - Core Inventory</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>
    <div class="sidebar">
        <h2>Inventory</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="receipts.html">Receipts</a>
        <a href="delivery.html">Delivery</a>
        <a href="transfer.html">Transfer</a>
        <a href="adjustment.html">Adjustment</a>
        <a href="history.html">History</a>
        <a href="warehouse1.html">Warehouses</a>
        <a href="login.html" id="Logout">Logout</a>
    </div>

    <div class="main">
        <h1>Incoming Goods (Receipts)</h1>
        <div class="form-card">
            <h3>Receive Product</h3>
            <input type="text" id="rVendor" placeholder="Vendor Name">
            <input type="text" id="rProduct" placeholder="Product">
            <input type="number" id="rQty" placeholder="Quantity">
            <input type="text" id="rWh" placeholder="Warehouse">
            <button onclick="addReceipt()">Receive Product</button>
        </div>

        <h2>Recent Receipts</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Vendor</th>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Warehouse</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
