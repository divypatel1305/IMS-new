<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Inventory Adjustment</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>
<div class="sidebar">
    <h2>Inventory</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="receipts.html">Receipts</a>

<div class="main">
    <h1>Inventory Adjustment</h1>
    <div class="form-card">
        <h3>Adjust Stock</h3>
        <input type="text" id="aProduct" placeholder="Product Name">
        <input type="text" id="aWh" placeholder="Warehouse">
        <input type="number" id="aSysQty" placeholder="System Quantity">
        <input type="number" id="aActQty" placeholder="Actual Quantity">
        <input type="text" id="aReason" placeholder="Reason">
        <button onclick="addAdjustment()">Adjust Stock</button>
    </div>

    <h2>Adjustment History</h2>
    <table>
        <thead>
            <tr><th>Date</th><th>Product</th><th>Warehouse</th><th>System Qty</th><th>Actual Qty</th><th>Reason</th></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
<script src="script.js"></script>
</body>
